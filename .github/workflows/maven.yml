
name: API Testing Framework

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: 00 13 * * *
    

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 18
      uses: actions/setup-java@v4
      with:
        java-version: '18'
        distribution: 'temurin'
        cache: maven
    - name: Exceute Tests
      run: mvn clean test -Dsuite=testng -X
      
    - name: Download a Build Artifact
      uses: actions/download-artifact@v3.1.0
      with:
        name: log
        path: logs/

